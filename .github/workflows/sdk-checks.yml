name: SDK Checks

on:
  push:
  pull_request:

jobs:
  node:
    name: Node
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-node
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: sdk-node/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run node checks
        run: |
          pnpm typecheck
          pnpm exec vitest run \
            tests/webhook/auth.test.ts \
            tests/webhook/encoding.test.ts \
            tests/webhook/index.test.ts \
            tests/webhook/signing.test.ts \
            tests/webhook/validation.test.ts

  python:
    name: Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-python
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --dev

      - name: Run python checks
        run: |
          uv run ruff check .
          uv run basedpyright
          uv run pytest tests -k "not shared_fixtures"

  go:
    name: Go
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk-go
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: sdk-go/go.sum

      - name: Run go checks
        run: |
          go test ./...

  shared:
    name: Shared
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: sdk-node/pnpm-lock.yaml

      - uses: astral-sh/setup-uv@v8.0.0
        with:
          python-version: "3.14"

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache-dependency-path: sdk-go/go.sum

      - name: Install node dependencies
        working-directory: sdk-node
        run: pnpm install --frozen-lockfile

      - name: Sync python dependencies
        working-directory: sdk-python
        run: uv sync --dev

      - name: Run shared fixture checks
        run: |
          cd sdk-node && pnpm exec vitest run tests/webhook/shared-fixtures.test.ts
          cd ../sdk-python && uv run pytest tests/test_shared_fixtures.py
          cd ../sdk-go && go test -run TestSharedCompatibilityFixtures ./...
